<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahadith — Love &amp; Respect</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0e0c08;
  --surface:   #16120d;
  --surface2:  #1e1810;
  --border:    #2e2518;
  --border2:   #3d3220;
  --gold:      #c9a84c;
  --gold2:     #e8c97a;
  --gold-dim:  #7a6130;
  --green:     #2a5c42;
  --green2:    #3d8c62;
  --text:      #e8dfc8;
  --text-dim:  #8a7e68;
  --text-faint:#4a4030;
  --arabic:    #f0e6cc;
  --urdu:      #c8bda0;
  --red:       #8c3a2a;
  --tag-love:      #7a4020;
  --tag-respect:   #1e3d5c;
  --tag-brother:   #2a4020;
  --tag-parents:   #4a2060;
  --tag-prophet:   #3d1a08;
  --tag-kids:      #1a3d2a;
  --radius: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 15px;
  line-height: 1.6;
}

/* ── STICKY HEADER ── */
#appHeader {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
}

.header-brand {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 0 0 auto;
}
.brand-ar {
  font-family: 'Amiri', serif;
  font-size: 1.15rem;
  color: var(--gold);
  line-height: 1;
  direction: rtl;
}
.brand-en {
  font-size: 0.72rem;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 480px;
}
.search-wrap input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 9px 14px 9px 38px;
  font-family: 'Lora', serif;
  font-size: 0.88rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input::placeholder { color: var(--text-faint); }
.search-wrap input:focus { border-color: var(--gold-dim); }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint); font-size: 0.9rem; pointer-events: none;
}

.header-meta {
  margin-left: auto;
  text-align: right;
  flex: 0 0 auto;
}
#countDisplay {
  font-size: 0.82rem;
  color: var(--gold);
  font-weight: 600;
}
.meta-sub {
  font-size: 0.72rem;
  color: var(--text-faint);
}

/* filter row */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 8px 20px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  align-items: center;
}
.filter-row::-webkit-scrollbar { display: none; }

.filter-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  white-space: nowrap;
  margin-right: 4px;
}

.ftag {
  padding: 4px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-dim);
  font-family: 'Lora', serif;
  font-size: 0.78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.ftag:hover { border-color: var(--gold-dim); color: var(--gold); }
.ftag.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #0e0c08;
  font-weight: 600;
}

/* column header */
.col-header {
  display: grid;
  grid-template-columns: 48px 1fr 120px 90px;
  gap: 0;
  padding: 7px 20px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
}
@media(max-width:600px){
  .col-header { grid-template-columns: 40px 1fr; }
  .col-header .ch-source, .col-header .ch-tag { display: none; }
}

/* ── LIST CONTAINER ── */
#listContainer {
  padding: 0 0 80px;
}

/* ── ROW ── */
.hadith-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  animation: rowIn 0.25s ease both;
}
.hadith-row:hover { background: var(--surface2); }
.hadith-row.open   { background: var(--surface2); border-bottom-color: var(--border2); }

@keyframes rowIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* collapsed row */
.row-collapsed {
  display: grid;
  grid-template-columns: 48px 1fr 120px 90px;
  gap: 0;
  align-items: center;
  padding: 11px 20px;
  min-height: 52px;
}
@media(max-width:600px){
  .row-collapsed { grid-template-columns: 40px 1fr; }
}

.row-num {
  font-size: 0.75rem;
  color: var(--gold-dim);
  font-weight: 600;
  letter-spacing: 0.04em;
}

.row-preview {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}
.preview-ar {
  font-family: 'Amiri', serif;
  font-size: 1.05rem;
  color: var(--arabic);
  direction: rtl;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.5;
}
.preview-en {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.row-source {
  font-size: 0.72rem;
  color: var(--text-faint);
  padding-left: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
@media(max-width:600px){ .row-source { display: none; } }

.row-tag {
  padding-left: 12px;
}
@media(max-width:600px){ .row-tag { display: none; } }

.tag-pill {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 10px;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tag-love      { background: var(--tag-love);    color: #f0b080; }
.tag-respect   { background: var(--tag-respect);  color: #80b8e8; }
.tag-brotherhood { background: var(--tag-brother); color: #90d8a0; }
.tag-parents   { background: var(--tag-parents);  color: #d8a8f0; }
.tag-prophet   { background: var(--tag-prophet);  color: #f0c880; }
.tag-kids      { background: var(--tag-kids);     color: #90e8b8; }

/* ── EXPANDED PANEL ── */
.row-expanded {
  display: none;
  padding: 0 20px 24px 20px;
  border-top: 1px solid var(--border);
}
.hadith-row.open .row-expanded { display: block; }

.expanded-inner {
  max-width: 860px;
  margin: 0 auto;
}

.lang-block {
  padding: 18px 0 14px;
  border-bottom: 1px solid var(--border);
}
.lang-block:last-child { border-bottom: none; }

.lang-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--gold-dim);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.lang-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.arabic-full {
  font-family: 'Amiri', serif;
  font-size: 1.55rem;
  line-height: 2.1;
  direction: rtl;
  text-align: right;
  color: var(--arabic);
}

.english-full {
  font-family: 'Lora', serif;
  font-size: 1.0rem;
  line-height: 1.75;
  color: var(--text);
  font-style: italic;
}

.urdu-full {
  font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
  font-size: 1.1rem;
  line-height: 2.2;
  direction: rtl;
  text-align: right;
  color: var(--urdu);
}

.expanded-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.source-badge {
  font-size: 0.75rem;
  color: var(--gold);
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 4px;
  padding: 4px 12px;
  letter-spacing: 0.04em;
}
.close-btn {
  font-size: 0.72rem;
  color: var(--text-faint);
  cursor: pointer;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: color 0.15s;
}
.close-btn:hover { color: var(--gold); }

/* ── NO RESULTS ── */
#noResults {
  display: none;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-faint);
  font-style: italic;
  font-size: 1rem;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

  {

    ur: "صدقہ گناہ کو اس طرح مٹاتا ہے جیسے پانی آگ کو بجھاتا ہے۔",

/* ── TAG CONFIG ── */
const TAG_META = {
  love:         { label: "Love",         cls: "tag-love"         },
  respect:      { label: "Respect",      cls: "tag-respect"      },
  brotherhood:  { label: "Brotherhood",  cls: "tag-brotherhood"  },
  parents:      { label: "Parents",      cls: "tag-parents"      },
  prophet:      { label: "Prophet ﷺ",   cls: "tag-prophet"      },
  kids:         { label: "For Kids",     cls: "tag-kids"         },
};

/* ── STATE ── */
let activeTag   = "all";
let openRowIdx  = null;
let filtered    = [];

/* ── RENDER ── */
function buildList() {
  const container = document.getElementById("listContainer");
  const noRes     = document.getElementById("noResults");
  container.innerHTML = "";

  if (filtered.length === 0) {
    noRes.style.display = "block";
    document.getElementById("countDisplay").textContent = "0";
    return;
  }
  noRes.style.display = "none";
  document.getElementById("countDisplay").textContent = filtered.length;

  filtered.forEach((h, i) => {
    const globalIdx = HADITHS.indexOf(h);
    const num       = globalIdx + 1;
    const primaryTag = h.tags[0] || "love";
    const tagMeta   = TAG_META[primaryTag] || TAG_META.love;

    // Arabic preview — first 60 chars
    const arPreview = h.ar.length > 65 ? h.ar.slice(0, 65) + "…" : h.ar;
    const enPreview = h.en.length > 80 ? h.en.slice(0, 80) + "…" : h.en;

    const div = document.createElement("div");
    div.className = "hadith-row";
    div.dataset.idx = globalIdx;
    div.style.animationDelay = Math.min(i * 8, 200) + "ms";

    div.innerHTML = `
      <div class="row-collapsed" onclick="toggleRow(${globalIdx}, this)">
        <span class="row-num">${String(num).padStart(3,"0")}</span>
        <div class="row-preview">
          <span class="preview-ar">${arPreview}</span>
          <span class="preview-en">${enPreview}</span>
        </div>
        <span class="row-source">${h.src}</span>
        <div class="row-tag">
          <span class="tag-pill ${tagMeta.cls}">${tagMeta.label}</span>
        </div>
      </div>
      <div class="row-expanded">
        <div class="expanded-inner">
          <div class="lang-block">
            <div class="lang-label">Arabic · عربي</div>
            <div class="arabic-full">${h.ar}</div>
          </div>
          <div class="lang-block">
            <div class="lang-label">English</div>
            <div class="english-full">${h.en}</div>
          </div>
          <div class="lang-block">
            <div class="lang-label">Urdu · اردو</div>
            <div class="urdu-full">${h.ur}</div>
          </div>
          <div class="expanded-footer">
            <span class="source-badge">◆ ${h.src}</span>
            <span class="close-btn" onclick="closeRow(${globalIdx}, event)">▲ collapse</span>
          </div>
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

function toggleRow(idx, el) {
  const row = el.closest(".hadith-row");
  const isOpen = row.classList.contains("open");

  // close previous
  if (openRowIdx !== null && openRowIdx !== idx) {
    const prev = document.querySelector(`.hadith-row[data-idx="${openRowIdx}"]`);
    if (prev) prev.classList.remove("open");
  }

  row.classList.toggle("open", !isOpen);
  openRowIdx = isOpen ? null : idx;

  if (!isOpen) {
    setTimeout(() => row.scrollIntoView({ behavior: "smooth", block: "nearest" }), 50);
  }
}

function closeRow(idx, e) {
  e.stopPropagation();
  const row = document.querySelector(`.hadith-row[data-idx="${idx}"]`);
  if (row) row.classList.remove("open");
  openRowIdx = null;
}

/* ── FILTER ── */
function applyFilters() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  filtered = HADITHS.filter(h => {
    const tagOk = activeTag === "all" || h.tags.includes(activeTag);
    if (!tagOk) return false;
    if (!q) return true;
    return (
      h.ar.includes(q) ||
      h.en.toLowerCase().includes(q) ||
      h.ur.includes(q) ||
      h.src.toLowerCase().includes(q)
    );
  });
  openRowIdx = null;
  buildList();
}

function setTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll(".ftag").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

/* ── INIT ── */
filtered = [...HADITHS];
buildList();
</script>
